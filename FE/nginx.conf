server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip static assets
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Cache hashed build assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Proxy API + health checks to the Flask backend.
  # Update `proxy_pass` to point at your backend host/port.
  location /api/ {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # RAG generation can be slow — extend timeouts.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    # Allow large PDF uploads (matches backend 50MB limit)
    client_max_body_size 50m;
  }

  location /health {
    proxy_pass http://backend:5000;
    proxy_set_header Host $host;
  }

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
